<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>
      Admin Portal Login | School for Interdisciplinary Studies & Sustainability
    </title>
    <meta
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
      name="viewport"
    />
    <!-- Bootstrap 3.3.2 -->
    <link
      href="../bootstrap/css/bootstrap.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Font Awesome Icons -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Custom Admin Login CSS -->
    <link
      href="../dist/css/admin/login.css?v=1.0"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body class="login-page">
    <div class="container">
      <div class="row">
        <div
          class="col-xs-12 col-sm-8 col-sm-offset-2 col-md-6 col-md-offset-3 col-lg-4 col-lg-offset-4"
        >
          <div class="login-box">
            <div class="login-logo">
              <img src="../dist/img/iitg-logo.png" alt="IIT Guwahati Logo" />
              <h1 class="login-logo-title">
                <span class="login-logo-hindi"
                  >अंतर्विषयक अध्ययन एवं सततता स्कूल</span
                >
                School for Interdisciplinary Studies & Sustainability
                <span class="login-logo-subtitle"
                  >Indian Institute of Technology Guwahati</span
                >
              </h1>
            </div>
            <!-- /.login-logo -->

            <div class="login-box-body">
              <h2 class="login-box-msg">Admin Log In</h2>
              <form action="../index2.html" method="post">
                <div class="form-group has-feedback">
                  <input
                    type="email"
                    class="form-control"
                    placeholder="Email Address"
                    required
                    id="admin_email"
                  />
                  <span class="fa fa-envelope form-control-feedback"></span>
                </div>

                <div class="form-group has-feedback">
                  <input
                    type="password"
                    class="form-control"
                    placeholder="Password"
                    required
                    id="admin_password"
                  />
                  <span class="fa fa-lock form-control-feedback"></span>
                  <button
                    type="button"
                    id="password_toggle_btn"
                    class="password-toggle"
                    title="Show/Hide Password"
                  >
                    <i class="fa-solid fa-eye"></i>
                  </button>
                </div>

                <div class="form-group">
                  <label for="captcha_input" class="control-label captcha-label"
                    >Captcha Verification</label
                  >
                  <div class="captcha-container">
                    <div
                      id="captcha_display"
                      class="captcha-box"
                      title="Click to refresh CAPTCHA"
                    >
                      XXXXXX
                    </div>
                    <button
                      type="button"
                      class="refresh-captcha-btn"
                      id="refresh_captcha_btn"
                      title="Refresh CAPTCHA"
                    >
                      <i class="fa-solid fa-arrows-rotate"></i>
                    </button>
                  </div>
                  <div class="has-feedback">
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Enter Captcha Code"
                      required
                      id="captcha_input"
                      autocomplete="off"
                    />
                    <span
                      class="fa-solid fa-shield-halved form-control-feedback"
                    ></span>
                  </div>
                </div>

                <div class="row login-submit-row">
                  <div class="col-xs-12">
                    <button
                      type="submit"
                      class="btn btn-primary btn-block btn-flat"
                      id="login_submit_btn"
                    >
                      Sign In
                    </button>
                  </div>
                  <!-- /.col -->
                </div>
              </form>

              <div class="login-footer-links">
                <a href="#"
                  ><i class="fa-solid fa-unlock-keyhole"></i> Forgot
                  password?</a
                >
                <a href="../index.php"
                  ><i class="fa-solid fa-house"></i> Back to Site</a
                >
              </div>
            </div>
            <!-- /.login-box-body -->
          </div>
          <!-- /.login-box -->
        </div>
        <!-- /.col -->
      </div>
      <!-- /.row -->
    </div>
    <!-- /.container -->

    <!-- jQuery 2.1.3 -->
    <script src="../plugins/jQuery/jQuery-2.1.3.min.js"></script>
    <!-- Bootstrap 3.3.2 JS -->
    <script
      src="../bootstrap/js/bootstrap.min.js"
      type="text/javascript"
    ></script>

    <script>
      $(function () {
        // Captcha Generator
        function generateCaptcha() {
          const chars =
            "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
          let captchaCode = "";
          for (let i = 0; i < 6; i++) {
            captchaCode += chars[Math.floor(Math.random() * chars.length)];
          }
          $("#captcha_display")
            .text(captchaCode)
            .attr("data-code", captchaCode);
          $("#captcha_input").val("");
        }

        // Initialize Captcha
        generateCaptcha();

        // Refresh Captcha
        $("#refresh_captcha_btn, #captcha_display").on("click", function (e) {
          e.preventDefault();
          generateCaptcha();
        });

        // Password Show/Hide Toggle
        $("#password_toggle_btn").on("click", function (e) {
          e.preventDefault();
          const passwordInput = $("#admin_password");
          const icon = $(this).find("i");
          if (passwordInput.attr("type") === "password") {
            passwordInput.attr("type", "text");
            icon.removeClass("fa-eye").addClass("fa-eye-slash");
          } else {
            passwordInput.attr("type", "password");
            icon.removeClass("fa-eye-slash").addClass("fa-eye");
          }
        });

        // Form Validation and AJAX Submission on submit
        $("form").on("submit", function (e) {
          e.preventDefault();

          const email = $("#admin_email").val().trim();
          const password = $("#admin_password").val();
          const enteredCaptcha = $("#captcha_input").val().trim();
          const actualCaptcha = $("#captcha_display").attr("data-code");

          if (enteredCaptcha.toLowerCase() !== actualCaptcha.toLowerCase()) {
            alert("Invalid CAPTCHA code. Please check and try again.");
            generateCaptcha();
            $("#captcha_input").focus();
            return;
          }

          const $submitBtn = $("#login_submit_btn");
          const originalText = $submitBtn.text();
          $submitBtn.prop("disabled", true).text("Signing In...");

          $.ajax({
            url: "../api/admin_auth.php",
            type: "POST",
            dataType: "json",
            data: {
              action: "login",
              email: email,
              password: password,
              captcha: enteredCaptcha,
              expected_captcha: actualCaptcha,
              login_type: "admin",
            },
            success: function (response) {
              if (response.success) {
                window.location.href = "./dashboard.php";
              } else {
                alert(response.message || "Incorrect email or password.");
                generateCaptcha();
                $("#admin_password").val("");
                $("#captcha_input").val("");
                $("#admin_password").focus();
              }
            },
            error: function (xhr, status, error) {
              alert(
                "An error occurred during authentication. Please try again.",
              );
              console.error(error);
              generateCaptcha();
            },
            complete: function () {
              $submitBtn.prop("disabled", false).text(originalText);
            },
          });
        });
      });
    </script>
  </body>
</html>
